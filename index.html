<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For You</title>
    <!-- Gagamit tayo ng Dancing Script font para magmukhang sulat-kamay -->
    <link href="https://googleapis.com" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <label class="envelope-wrapper">
            <input type="checkbox" id="open">
            <div class="envelope">
                <div class="letter">
                    <div class="heart-inside"></div>
                    <div class="text">
                        <p>To be honest, home doesn't really feel like a place anymore, it's just wherever you are.</p>
                        <p>I’m missing my favorite person today and just wanted to let you know that you're constantly on my mind.</p>
                        <p>I hope you're having a good day, but I’d like it better if I was spending it with you.</p>
                        <p class="signature">From: Xi</p>
                    </div>
                </div>
                <div class="front-flap"></div>
                <div class="pocket"></div>
            </div>
            <div class="btn-open">PINDUTIN MO 'TO :)</div>
        </label>
    </div>
</body>
</html>
